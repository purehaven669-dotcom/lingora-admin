<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پنل مدیریت درس‌ها</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sand:#FAF6EF;
    --ink:#23272B;
    --lapis:#1F4E8C;
    --lapis-dark:#163963;
    --turquoise:#2E9E8F;
    --ochre:#C08A3E;
    --line:#E4DECF;
    --danger:#B3452F;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Vazirmatn','Inter',sans-serif;
    background:var(--sand);
    color:var(--ink);
    min-height:100vh;
  }
  .topbar{
    background:var(--lapis-dark);
    color:#fff;
    padding:16px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:20;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  .topbar h1{font-size:17px;margin:0;font-weight:600;}
  .topbar .tile-rule{
    height:4px;width:56px;
    background:repeating-linear-gradient(45deg,var(--ochre) 0 6px,var(--turquoise) 6px 12px);
    border-radius:2px;margin-top:4px;
  }
  #logoutBtn{
    background:transparent;border:1px solid rgba(255,255,255,.4);
    color:#fff;padding:6px 14px;border-radius:8px;font-family:inherit;
    font-size:13px;cursor:pointer;
  }
  .wrap{max-width:720px;margin:0 auto;padding:18px 16px 80px;}

  /* Login */
  #loginScreen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:20px;
  }
  .login-card{
    background:var(--card);border-radius:16px;padding:32px 26px;
    max-width:360px;width:100%;box-shadow:0 8px 30px rgba(31,78,140,.12);
    border-top:4px solid var(--ochre);
  }
  .login-card h2{margin-top:0;color:var(--lapis-dark);}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;color:#5b5f63;margin-bottom:6px;font-weight:500;}
  .field input,.field select,.field textarea{
    width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;
    font-family:inherit;font-size:14px;background:#fff;color:var(--ink);
  }
  .field input:focus,.field select:focus,.field textarea:focus{
    outline:none;border-color:var(--lapis);
  }
  textarea{resize:vertical;min-height:70px;}
  .btn{
    display:inline-block;background:var(--lapis);color:#fff;border:none;
    padding:11px 20px;border-radius:9px;font-family:inherit;font-size:14px;
    font-weight:600;cursor:pointer;
  }
  .btn:hover{background:var(--lapis-dark);}
  .btn.secondary{background:#fff;color:var(--lapis);border:1.5px solid var(--lapis);}
  .btn.secondary:hover{background:#eef3f9;}
  .btn.danger{background:#fff;color:var(--danger);border:1.5px solid var(--danger);}
  .btn.danger:hover{background:#fbeae6;}
  .btn.small{padding:6px 12px;font-size:12.5px;}
  .btn.block{width:100%;}
  #loginError{color:var(--danger);font-size:13px;margin-top:8px;min-height:18px;}

  /* Lesson list */
  .section-title{
    font-size:14px;color:var(--lapis-dark);font-weight:700;margin:26px 0 12px;
    display:flex;align-items:center;gap:8px;
  }
  .section-title .tick{width:14px;height:14px;border-radius:3px;background:var(--turquoise);}
  .lesson-card{
    background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:10px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    border-right:4px solid var(--turquoise);
  }
  .lesson-card.draft{border-right-color:var(--ochre);}
  .lesson-card .info b{display:block;font-size:15px;}
  .lesson-card .info span{font-size:12.5px;color:#77808a;}
  .badge{
    font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;
    background:#e6f4f1;color:var(--turquoise);
  }
  .badge.draft{background:#fbf1e2;color:var(--ochre);}
  .lesson-actions{display:flex;gap:6px;flex-wrap:wrap;}

  /* Form */
  .form-card{
    background:var(--card);border-radius:14px;padding:20px;margin-top:14px;
    box-shadow:0 4px 18px rgba(0,0,0,.05);
  }
  .form-card h3{
    margin-top:0;color:var(--lapis-dark);font-size:16px;
    border-bottom:2px solid var(--line);padding-bottom:10px;margin-bottom:16px;
  }
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:480px){.row2{grid-template-columns:1fr;}}
  .subitem{
    background:var(--sand);border-radius:10px;padding:12px;margin-bottom:10px;
    border:1px solid var(--line);position:relative;
  }
  .subitem .remove-x{
    position:absolute;top:8px;left:8px;background:none;border:none;
    color:var(--danger);cursor:pointer;font-size:16px;line-height:1;
  }
  .add-row-btn{
    background:none;border:1.5px dashed var(--lapis);color:var(--lapis);
    padding:9px;border-radius:9px;width:100%;font-family:inherit;font-size:13.5px;
    cursor:pointer;margin-bottom:16px;
  }
  .add-row-btn:hover{background:#eef3f9;}
  .fab-new{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    background:var(--lapis);color:#fff;border:none;padding:14px 26px;
    border-radius:30px;font-family:inherit;font-size:14px;font-weight:700;
    box-shadow:0 6px 20px rgba(31,78,140,.35);cursor:pointer;z-index:15;
  }
  .toast{
    position:fixed;top:70px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:10px 20px;border-radius:10px;
    font-size:13.5px;z-index:50;opacity:0;transition:opacity .25s;pointer-events:none;
  }
  .toast.show{opacity:1;}
  .hidden{display:none !important;}
  .empty-state{
    text-align:center;color:#8a8f94;padding:40px 20px;font-size:14px;
  }
  .form-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
</style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="loginScreen">
  <div class="login-card">
    <div class="tile-rule" style="background:repeating-linear-gradient(45deg,var(--ochre) 0 6px,var(--turquoise) 6px 12px);height:4px;width:56px;border-radius:2px;margin-bottom:14px;"></div>
    <h2>ورود به پنل مدیریت</h2>
    <div class="field">
      <label>ایمیل</label>
      <input type="email" id="loginEmail" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>رمز عبور</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
    </div>
    <button class="btn block" onclick="doLogin()">ورود</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app" class="hidden">
  <div class="topbar">
    <div>
      <h1>پنل مدیریت درس‌ها</h1>
      <div class="tile-rule"></div>
    </div>
    <button id="logoutBtn" onclick="doLogout()">خروج</button>
  </div>

  <div class="wrap">
    <div class="section-title"><span class="tick"></span> فهرست درس‌ها</div>
    <div id="lessonList"></div>

    <div id="formArea"></div>
  </div>

  <button class="fab-new" onclick="openNewLessonForm()">+ درس جدید</button>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK (compat, no build tools needed) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<script>
/* =====================================================================
   ۱) پیکربندی Firebase
   این مقادیر را از Firebase Console بگیر:
   Project settings → General → Your apps → SDK setup and configuration
   ===================================================================== */
const firebaseConfig = {
  apiKey: "PASTE_YOUR_API_KEY",
  authDomain: "PASTE_YOUR_PROJECT.firebaseapp.com",
  projectId: "PASTE_YOUR_PROJECT_ID",
  storageBucket: "PASTE_YOUR_PROJECT.appspot.com",
  messagingSenderId: "PASTE_YOUR_SENDER_ID",
  appId: "PASTE_YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* =====================================================================
   ۲) وضعیت برنامه
   ===================================================================== */
let lessons = [];        // همه‌ی درس‌ها از Firestore
let editingId = null;    // اگر در حال ویرایش درسی هستیم، آی‌دی آن
let vocabRows = [];      // ردیف‌های لغت در فرم جاری
let exerciseRows = [];   // ردیف‌های تمرین در فرم جاری

/* =====================================================================
   ۳) ورود / خروج
   ===================================================================== */
function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  document.getElementById('loginError').textContent = '';
  auth.signInWithEmailAndPassword(email, pass).catch(err=>{
        document.getElementById('loginError').textContent = 'خطا: ' + err.code + ' - ' + err.message;

  });
}
function doLogout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    loadLessons();
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
});

/* =====================================================================
   ۴) خواندن فهرست درس‌ها
   ===================================================================== */
function loadLessons(){
  db.collection('lessons').orderBy('order','asc').onSnapshot(snap=>{
    lessons = [];
    snap.forEach(doc=> lessons.push({ ...doc.data(), id: doc.id }));
    renderLessonList();
  }, err=>{
    document.getElementById('lessonList').innerHTML =
      '<div class="empty-state">خطا در خواندن اطلاعات: '+err.message+'</div>';
  });
}

function renderLessonList(){
  const wrap = document.getElementById('lessonList');
  if(lessons.length === 0){
    wrap.innerHTML = '<div class="empty-state">هنوز درسی اضافه نشده. با دکمه «+ درس جدید» شروع کن.</div>';
    return;
  }
  wrap.innerHTML = lessons.map(l=>`
    <div class="lesson-card ${l.status==='draft'?'draft':''}">
      <div class="info">
        <b>${escapeHtml(l.title||'(بدون عنوان)')}</b>
        <span>${l.level||''} · ${l.language==='german'?'آلمانی':'انگلیسی'} · ${escapeHtml(l.category||'')} · شماره ${l.order??''}</span>
      </div>
      <div class="lesson-actions">
        <span class="badge ${l.status==='draft'?'draft':''}">${l.status==='draft'?'پیش‌نویس':'منتشرشده'}</span>
        <button class="btn small secondary" onclick="editLesson('${l.id}')">ویرایش</button>
        <button class="btn small secondary" onclick="duplicateLesson('${l.id}')">کپی</button>
        <button class="btn small danger" onclick="deleteLesson('${l.id}')">حذف</button>
      </div>
    </div>
  `).join('');
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* =====================================================================
   ۵) فرم افزودن / ویرایش درس
   ===================================================================== */
function blankLesson(){
  return {
    title:'', language:'german', level:'A0', category:'', order: lessons.length+1,
    status:'draft', coverImageUrl:'',
    story:{text:'', videoUrl:''},
    analysis:'',
    grammarNote:{title:'', explanation:''},
    secondStory:{text:'', videoUrl:''},
    roleplayScenario:''
  };
}

function openNewLessonForm(){
  editingId = null;
  vocabRows = [];
  exerciseRows = [];
  renderForm(blankLesson());
  document.getElementById('formArea').scrollIntoView({behavior:'smooth'});
}

function editLesson(id){
  const l = lessons.find(x=>x.id===id);
  if(!l) return;
  editingId = id;
  vocabRows = (l.vocabulary||[]).map(v=>({...v}));
  exerciseRows = (l.exercises||[]).map(e=>({...e}));
  renderForm(l);
  document.getElementById('formArea').scrollIntoView({behavior:'smooth'});
}

function duplicateLesson(id){
  const l = lessons.find(x=>x.id===id);
  if(!l) return;
  editingId = null;
  vocabRows = (l.vocabulary||[]).map(v=>({...v}));
  exerciseRows = (l.exercises||[]).map(e=>({...e}));
  const copy = {...l, title: l.title + ' (کپی)', order: lessons.length+1, status:'draft'};
  renderForm(copy);
  document.getElementById('formArea').scrollIntoView({behavior:'smooth'});
}

function deleteLesson(id){
  if(!confirm('این درس برای همیشه حذف شود؟')) return;
  db.collection('lessons').doc(id).delete().then(()=>showToast('درس حذف شد'));
}

function renderForm(l){
  const isGerman = l.language === 'german';
  document.getElementById('formArea').innerHTML = `
    <div class="form-card">
      <h3>${editingId ? 'ویرایش درس' : 'درس جدید'}</h3>

      <div class="row2">
        <div class="field"><label>عنوان درس</label>
          <input id="f_title" value="${escapeHtml(l.title)}" placeholder="مثلاً: در رستوران"></div>
        <div class="field"><label>شماره ترتیب درس</label>
          <input id="f_order" type="number" value="${l.order??''}"></div>
      </div>

      <div class="row2">
        <div class="field"><label>زبان</label>
          <select id="f_language" onchange="toggleArticleFields()">
            <option value="german" ${isGerman?'selected':''}>آلمانی</option>
            <option value="english" ${!isGerman?'selected':''}>انگلیسی</option>
          </select></div>
        <div class="field"><label>سطح</label>
          <select id="f_level">
            <option value="A0" ${l.level==='A0'?'selected':''}>A0 (رایگان)</option>
            <option value="A1" ${l.level==='A1'?'selected':''}>A1 (پولی)</option>
            <option value="A2" ${l.level==='A2'?'selected':''}>A2 (پولی)</option>
          </select></div>
      </div>

      <div class="row2">
        <div class="field"><label>موضوع / دسته</label>
          <input id="f_category" value="${escapeHtml(l.category)}" placeholder="خرید، دکتر، سفر..."></div>
        <div class="field"><label>وضعیت انتشار</label>
          <select id="f_status">
            <option value="draft" ${l.status==='draft'?'selected':''}>پیش‌نویس (فقط خودم می‌بینم)</option>
            <option value="published" ${l.status==='published'?'selected':''}>منتشرشده (کاربران می‌بینند)</option>
          </select></div>
      </div>

      <div class="field"><label>لینک تصویر کاور درس (اختیاری)</label>
        <input id="f_cover" value="${escapeHtml(l.coverImageUrl)}" placeholder="https://..."></div>

      <h3>۱. داستان</h3>
      <div class="field"><label>لینک ویدیو یوتیوب</label>
        <input id="f_storyVideo" value="${escapeHtml(l.story?.videoUrl)}" placeholder="https://youtube.com/..."></div>
      <div class="field"><label>متن داستان</label>
        <textarea id="f_storyText" rows="4">${escapeHtml(l.story?.text)}</textarea></div>

      <h3>۲. تحلیل داستان (ترجمه جمله‌به‌جمله)</h3>
      <div class="field">
        <textarea id="f_analysis" rows="4" placeholder="هر جمله را در یک خط بنویس، بعد ترجمه دری‌اش را">${escapeHtml(l.analysis)}</textarea></div>

      <h3>۳. لغات</h3>
      <div id="vocabWrap"></div>
      <button type="button" class="add-row-btn" onclick="addVocabRow()">+ افزودن لغت</button>

      <h3>۴. نکته گرامری</h3>
      <div class="field"><label>عنوان نکته</label>
        <input id="f_grammarTitle" value="${escapeHtml(l.grammarNote?.title)}" placeholder="مثلاً: زمان حال"></div>
      <div class="field"><label>توضیح ساده</label>
        <textarea id="f_grammarExp" rows="3">${escapeHtml(l.grammarNote?.explanation)}</textarea></div>

      <h3>۵. تمرین‌های تعاملی</h3>
      <div id="exerciseWrap"></div>
      <button type="button" class="add-row-btn" onclick="addExerciseRow()">+ افزودن تمرین</button>

      <h3>۶. داستان کوتاه دوم</h3>
      <div class="field"><label>لینک ویدیو (اختیاری)</label>
        <input id="f_story2Video" value="${escapeHtml(l.secondStory?.videoUrl)}"></div>
      <div class="field"><label>متن داستان دوم</label>
        <textarea id="f_story2Text" rows="4">${escapeHtml(l.secondStory?.text)}</textarea></div>

      <h3>۷. سناریوی مکالمه با AI</h3>
      <div class="field"><label>موضوع مکالمه (برای فعال‌سازی بعدی AI)</label>
        <textarea id="f_roleplay" rows="2" placeholder="مثلاً: کاربر نقش مشتری و AI نقش فروشنده را بازی می‌کند">${escapeHtml(l.roleplayScenario)}</textarea></div>

      <div class="form-actions">
        <button class="btn" onclick="saveLesson()">ذخیره درس</button>
        <button class="btn secondary" onclick="closeForm()">انصراف</button>
      </div>
    </div>
  `;
  renderVocabRows();
  renderExerciseRows();
}

function closeForm(){
  document.getElementById('formArea').innerHTML = '';
}

/* ---- لغات ---- */
function addVocabRow(){
  vocabRows.push({word:'', article:'', pronunciation:'', meaningDari:'', example:''});
  renderVocabRows();
}
function removeVocabRow(i){ vocabRows.splice(i,1); renderVocabRows(); }
function renderVocabRows(){
  const wrap = document.getElementById('vocabWrap');
  if(!wrap) return;
  const isGerman = document.getElementById('f_language')?.value === 'german';
  wrap.innerHTML = vocabRows.map((v,i)=>`
    <div class="subitem">
      <button type="button" class="remove-x" onclick="removeVocabRow(${i})">✕</button>
      <div class="row2">
        ${isGerman?`<div class="field"><label>آرتیکل</label>
          <select onchange="vocabRows[${i}].article=this.value">
            <option value="" ${!v.article?'selected':''}>—</option>
            <option value="der" ${v.article==='der'?'selected':''}>der</option>
            <option value="die" ${v.article==='die'?'selected':''}>die</option>
            <option value="das" ${v.article==='das'?'selected':''}>das</option>
          </select></div>`:''}
        <div class="field"><label>لغت</label>
          <input value="${escapeHtml(v.word)}" onchange="vocabRows[${i}].word=this.value"></div>
      </div>
      <div class="row2">
        <div class="field"><label>تلفظ</label>
          <input value="${escapeHtml(v.pronunciation)}" onchange="vocabRows[${i}].pronunciation=this.value"></div>
        <div class="field"><label>معنی به دری</label>
          <input value="${escapeHtml(v.meaningDari)}" onchange="vocabRows[${i}].meaningDari=this.value"></div>
      </div>
      <div class="field"><label>جمله مثال</label>
        <input value="${escapeHtml(v.example)}" onchange="vocabRows[${i}].example=this.value"></div>
    </div>
  `).join('') || '<div class="empty-state">هنوز لغتی اضافه نشده</div>';
}
function toggleArticleFields(){ renderVocabRows(); }

/* ---- تمرین‌ها ---- */
function addExerciseRow(){
  exerciseRows.push({question:'', options:['','','',''], correctIndex:0});
  renderExerciseRows();
}
function removeExerciseRow(i){ exerciseRows.splice(i,1); renderExerciseRows(); }
function renderExerciseRows(){
  const wrap = document.getElementById('exerciseWrap');
  if(!wrap) return;
  wrap.innerHTML = exerciseRows.map((e,i)=>`
    <div class="subitem">
      <button type="button" class="remove-x" onclick="removeExerciseRow(${i})">✕</button>
      <div class="field"><label>سوال</label>
        <input value="${escapeHtml(e.question)}" onchange="exerciseRows[${i}].question=this.value"></div>
      ${[0,1,2,3].map(k=>`
        <div class="field"><label>گزینه ${k+1} ${e.correctIndex===k?'(پاسخ درست)':''}</label>
          <div style="display:flex;gap:8px;align-items:center;">
            <input style="flex:1" value="${escapeHtml(e.options[k]||'')}" onchange="exerciseRows[${i}].options[${k}]=this.value">
            <input type="radio" name="correct_${i}" ${e.correctIndex===k?'checked':''} onchange="exerciseRows[${i}].correctIndex=${k}; renderExerciseRows();">
          </div>
        </div>
      `).join('')}
    </div>
  `).join('') || '<div class="empty-state">هنوز تمرینی اضافه نشده</div>';
}

/* =====================================================================
   ۶) ذخیره در Firestore
   ===================================================================== */
function saveLesson(){
  const data = {
    title: document.getElementById('f_title').value.trim(),
    order: Number(document.getElementById('f_order').value) || 0,
    language: document.getElementById('f_language').value,
    level: document.getElementById('f_level').value,
    category: document.getElementById('f_category').value.trim(),
    status: document.getElementById('f_status').value,
    coverImageUrl: document.getElementById('f_cover').value.trim(),
    story:{
      videoUrl: document.getElementById('f_storyVideo').value.trim(),
      text: document.getElementById('f_storyText').value
    },
    analysis: document.getElementById('f_analysis').value,
    vocabulary: vocabRows,
    grammarNote:{
      title: document.getElementById('f_grammarTitle').value.trim(),
      explanation: document.getElementById('f_grammarExp').value
    },
    exercises: exerciseRows,
    secondStory:{
      videoUrl: document.getElementById('f_story2Video').value.trim(),
      text: document.getElementById('f_story2Text').value
    },
    roleplayScenario: document.getElementById('f_roleplay').value,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  if(!data.title){
    showToast('عنوان درس را وارد کن');
    return;
  }

  const col = db.collection('lessons');
  const promise = editingId
    ? col.doc(editingId).update(data)
    : col.add({...data, createdAt: firebase.firestore.FieldValue.serverTimestamp()});

  promise.then(()=>{
    showToast('درس ذخیره شد ✓');
    closeForm();
  }).catch(err=>{
    showToast('خطا: '+err.message);
  });
}

/* =====================================================================
   ۷) پیام‌های کوتاه (Toast)
   ===================================================================== */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
</script>
