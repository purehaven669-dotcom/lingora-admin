<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lingora</title>

<link rel="icon" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#163963">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Lingora">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lingora">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sand:#FAF6EF;
    --ink:#23272B;
    --lapis:#1F4E8C;
    --lapis-dark:#163963;
    --turquoise:#2E9E8F;
    --ochre:#C08A3E;
    --line:#E4DECF;
    --danger:#B3452F;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;font-family:'Inter',sans-serif;background:var(--sand);color:var(--ink);
    min-height:100vh;-webkit-tap-highlight-color:transparent;
  }
  .topbar{
    background:var(--lapis-dark);color:#fff;padding:16px 20px;display:flex;
    justify-content:space-between;align-items:center;position:sticky;top:0;z-index:20;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  .topbar h1{font-size:17px;margin:0;font-weight:600;}
  .topbar .tile-rule{
    height:4px;width:56px;
    background:repeating-linear-gradient(45deg,var(--ochre) 0 6px,var(--turquoise) 6px 12px);
    border-radius:2px;margin-top:4px;
  }
  #logoutBtn{
    background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;padding:6px 14px;
    border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer;
  }
  .wrap{max-width:640px;margin:0 auto;padding:18px 16px 90px;}
  .hidden{display:none !important;}

  /* Auth */
  #authScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .auth-card{
    background:var(--card);border-radius:16px;padding:32px 26px;max-width:360px;width:100%;
    box-shadow:0 8px 30px rgba(31,78,140,.12);border-top:4px solid var(--ochre);
  }
  .auth-card h2{margin-top:0;color:var(--lapis-dark);}
  .auth-tabs{display:flex;gap:8px;margin-bottom:18px;}
  .auth-tabs button{
    flex:1;background:#fff;border:1.5px solid var(--line);color:var(--ink);padding:9px;
    border-radius:9px;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;
  }
  .auth-tabs button.active{background:var(--lapis-dark);border-color:var(--lapis-dark);color:#fff;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;color:#5b5f63;margin-bottom:6px;font-weight:500;}
  .field input,.field select,.field textarea{
    width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;
    font-family:inherit;font-size:14px;background:#fff;color:var(--ink);
  }
  .field input:focus{outline:none;border-color:var(--lapis);}
  .btn{
    display:inline-block;background:var(--lapis);color:#fff;border:none;padding:11px 20px;
    border-radius:9px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;
  }
  .btn:hover{background:var(--lapis-dark);}
  .btn.secondary{background:#fff;color:var(--lapis);border:1.5px solid var(--lapis);}
  .btn.secondary:hover{background:#eef3f9;}
  .btn.small{padding:6px 12px;font-size:12.5px;}
  .btn.block{width:100%;}
  .btn:disabled{opacity:.55;cursor:not-allowed;}
  .btn.google{
    background:#fff;color:var(--ink);border:1.5px solid var(--line);
    display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
  }
  .btn.google:hover{background:#f5f5f5;}
  .divider{
    display:flex;align-items:center;gap:10px;margin:16px 0;color:#8a8f94;font-size:12.5px;
  }
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line);}
  #authError{color:var(--danger);font-size:13px;margin-top:8px;min-height:18px;}
  .link-btn{
    background:none;border:none;color:var(--lapis);font-family:inherit;font-size:13px;
    cursor:pointer;padding:0;margin-top:10px;
  }

  /* Content */
  .section-title{
    font-size:14px;color:var(--lapis-dark);font-weight:700;margin:22px 0 12px;
    display:flex;align-items:center;gap:8px;
  }
  .section-title .tick{width:14px;height:14px;border-radius:3px;background:var(--turquoise);}
  .card{
    background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:10px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    border-left:4px solid var(--turquoise);cursor:pointer;
  }
  .card.active-course{border-left-color:var(--lapis);}
  .card.locked{border-left-color:var(--ochre);opacity:.85;}
  .card .info b{display:block;font-size:15px;}
  .card .info span{font-size:12.5px;color:#77808a;}
  .badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;background:#e6f4f1;color:var(--turquoise);}
  .badge.draft{background:#fbf1e2;color:var(--ochre);}
  .empty-state{text-align:center;color:#8a8f94;padding:40px 20px;font-size:14px;}
  .course-pill{
    display:inline-flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--line);
    border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--lapis-dark);
    margin-bottom:16px;
  }

  /* Bottom nav */
  .bottom-nav{
    position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;
    border-top:1px solid var(--line);z-index:20;padding-bottom:env(safe-area-inset-bottom);
  }
  .bottom-nav button{
    flex:1;background:none;border:none;font-family:inherit;padding:12px 4px;font-size:12.5px;
    color:#8a8f94;cursor:pointer;font-weight:600;
  }
  .bottom-nav button.active{color:var(--lapis-dark);}

  /* Lesson content */
  .lesson-block{background:var(--card);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 4px 18px rgba(0,0,0,.05);}
  .lesson-block h3{margin-top:0;color:var(--lapis-dark);font-size:15px;border-bottom:2px solid var(--line);padding-bottom:8px;margin-bottom:12px;}
  .video-wrap{position:relative;width:100%;padding-top:56.25%;border-radius:10px;overflow:hidden;margin-bottom:12px;background:#000;}
  .video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}
  .story-text{white-space:pre-wrap;line-height:1.6;font-size:14.5px;}
  .vocab-row{border:1px solid var(--line);background:var(--sand);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
  .vocab-row .w{font-weight:700;font-size:15px;}
  .vocab-row .meaning{color:var(--turquoise);font-weight:600;font-size:13.5px;}
  .vocab-row .pron{color:#8a8f94;font-size:12.5px;}
  .vocab-row .ex{font-size:13px;color:#5b5f63;margin-top:4px;font-style:italic;}
  .quiz-q{margin-bottom:18px;}
  .quiz-q p{font-weight:600;font-size:14px;margin-bottom:8px;}
  .quiz-opt{
    display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);
    border-radius:9px;padding:10px 12px;margin-bottom:6px;font-family:inherit;font-size:13.5px;
    cursor:pointer;color:var(--ink);
  }
  .quiz-opt.correct{background:#e6f4f1;border-color:var(--turquoise);color:var(--turquoise);font-weight:600;}
  .quiz-opt.wrong{background:#fbeae6;border-color:var(--danger);color:var(--danger);font-weight:600;}
  .quiz-opt:disabled{cursor:default;}
  .locked-box{
    text-align:center;padding:30px 20px;background:#fff;border-radius:14px;
    border:1.5px dashed var(--ochre);color:#5b5f63;
  }
  .toast{
    position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:10px 20px;border-radius:10px;font-size:13.5px;z-index:50;opacity:0;
    transition:opacity .25s;pointer-events:none;
  }
  .toast.show{opacity:1;}
  .progress-track{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--turquoise);}
</style>
</head>
<body>

<!-- ===== AUTH SCREEN ===== -->
<div id="authScreen">
  <div class="auth-card">
    <img src="icon-192.png" alt="Lingora" style="width:56px;height:56px;border-radius:14px;margin-bottom:14px;">
    <h2 id="authTitle">Sign in</h2>
    <div class="auth-tabs">
      <button id="tabLoginBtn" class="active" onclick="setAuthMode('login')">Sign In</button>
      <button id="tabSignupBtn" onclick="setAuthMode('signup')">Create Account</button>
    </div>

    <button class="btn google" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.56 2.7-3.86 2.7-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.98v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.66 9c0-.59.1-1.17.29-1.7V4.97H.98A9 9 0 0 0 0 9c0 1.45.35 2.83.98 4.03l2.97-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .98 4.97l2.97 2.33C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
      Continue with Google
    </button>
    <div class="divider">or use email</div>

    <div id="nameField" class="field hidden">
      <label>Your name</label>
      <input id="authName" placeholder="Full name">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="authPassword" placeholder="••••••••">
    </div>

    <button class="btn block" id="authSubmitBtn" onclick="submitAuth()">Sign In</button>
    <button class="link-btn" onclick="resetPassword()">Forgot password?</button>
    <div id="authError"></div>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app" class="hidden">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="icon-192.png" alt="Lingora" style="width:32px;height:32px;border-radius:8px;">
      <div>
        <h1>Lingora</h1>
        <div class="tile-rule"></div>
      </div>
    </div>
    <button id="logoutBtn" onclick="doLogout()">Sign Out</button>
  </div>

  <div class="wrap">
    <div id="mainArea"></div>
  </div>

  <div class="bottom-nav">
    <button id="navLessonsBtn" class="active" onclick="setTab('lessons')">📚 Lessons</button>
    <button id="navLeagueBtn" onclick="setTab('league')">🏆 League</button>
    <button id="navProfileBtn" onclick="setTab('profile')">🙋 Profile</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<script>
/* =====================================================================
   1) Firebase configuration — same project as the admin panel, so
   lessons created there show up here immediately.
   ===================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyBvkz9wxSd9IOyVRc58oSsPsfTEc-gW8Is",
  authDomain: "lingora-01.firebaseapp.com",
  projectId: "lingora-01",
  storageBucket: "lingora-01.firebasestorage.app",
  messagingSenderId: "1086374209915",
  appId: "1:1086374209915:web:cfeb42a88e240bd04535de"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const googleProvider = new firebase.auth.GoogleAuthProvider();

/* =====================================================================
   2) State
   ===================================================================== */
let authMode = 'login';      // 'login' | 'signup'
let lessons = [];            // all lessons (loaded live from Firestore)
let me = null;                // current student's Firestore profile ({...data, id})
let currentTab = 'lessons';   // 'lessons' | 'profile'
let currentView = 'levels';   // 'levels' | 'switch' | 'lesson'
let currentPair = null;       // {expl:'dari', lang:'english'} — mirrors me.activePair
let currentLevel = 'A0';
let openLessonId = null;
let quizAnswers = {};          // { [exerciseIndex]: selectedOptionIndex } for the open lesson

/* Onboarding wizard state (first-time course pick, Duolingo-style) */
let onboardStep = 1;
let onboardExpl = null;
let onboardLang = null;

const LEAGUES = [
  {name:'Bronze', min:0},
  {name:'Silver', min:150},
  {name:'Gold', min:400},
  {name:'Platinum', min:900},
  {name:'Diamond', min:1800}
];
function leagueForXp(xp){
  let current = LEAGUES[0].name;
  LEAGUES.forEach(l=>{ if((xp||0) >= l.min) current = l.name; });
  return current;
}
function generateReferralCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i=0;i<6;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

const LANG_LABEL = {german:'German', english:'English', dari:'Dari'};
const ALL_PAIRS = [
  {expl:'dari', lang:'english'}, {expl:'english', lang:'dari'},
  {expl:'dari', lang:'german'},  {expl:'german', lang:'dari'},
  {expl:'english', lang:'german'}, {expl:'german', lang:'english'}
];
function pairKey(p){ return p.expl + '-' + p.lang; }
function pairLabel(p){ return LANG_LABEL[p.expl] + ' -> ' + LANG_LABEL[p.lang]; }

/* =====================================================================
   3) Auth: email/password + Google. Either path creates the matching
   Firestore "users" doc that the admin panel's Students tab reads.
   New accounts have no activePair yet, which triggers onboarding.
   ===================================================================== */
function setAuthMode(mode){
  authMode = mode;
  document.getElementById('tabLoginBtn').classList.toggle('active', mode==='login');
  document.getElementById('tabSignupBtn').classList.toggle('active', mode==='signup');
  document.getElementById('nameField').classList.toggle('hidden', mode==='login');
  document.getElementById('authTitle').textContent = mode==='login' ? 'Sign in' : 'Create your account';
  document.getElementById('authSubmitBtn').textContent = mode==='login' ? 'Sign In' : 'Create Account';
  document.getElementById('authError').textContent = '';
}

function ensureUserProfile(user, extra){
  extra = extra || {};
  const ref = db.collection('users').doc(user.uid);
  return ref.get().then(doc=>{
    if(!doc.exists){
      return ref.set({
        name: extra.name || user.displayName || '',
        email: user.email || '',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        subscription: { plan:'free', status:'active', expiresAt: null },
        progress: { completedLessonIds: [] }
        // activePair is intentionally left unset here — its absence is
        // what triggers the "choose your course" onboarding screen.
      });
    }
  });
}

function submitAuth(){
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const name = document.getElementById('authName').value.trim();
  const errBox = document.getElementById('authError');
  errBox.style.color = 'var(--danger)';
  errBox.textContent = '';

  if(!email || !password){ errBox.textContent = 'Please enter an email and password.'; return; }

  if(authMode === 'signup'){
    if(!name){ errBox.textContent = 'Please enter your name.'; return; }
    auth.createUserWithEmailAndPassword(email, password)
      .then(cred=> ensureUserProfile(cred.user, {name}))
      .catch(err=>{ errBox.textContent = friendlyAuthError(err); });
  } else {
    auth.signInWithEmailAndPassword(email, password)
      .catch(err=>{ errBox.textContent = friendlyAuthError(err); });
  }
}

function signInWithGoogle(){
  const errBox = document.getElementById('authError');
  errBox.style.color = 'var(--danger)';
  errBox.textContent = '';
  auth.signInWithPopup(googleProvider)
    .then(result=> ensureUserProfile(result.user))
    .catch(err=>{
      if(err.code === 'auth/popup-blocked' || err.code === 'auth/operation-not-supported-in-this-environment'){
        auth.signInWithRedirect(googleProvider);
      } else if(err.code !== 'auth/cancelled-popup-request' && err.code !== 'auth/popup-closed-by-user'){
        errBox.textContent = friendlyAuthError(err);
      }
    });
}
/* Completes the sign-in if we had to fall back to a redirect above
   (some in-app / installed-PWA browsers block popups). */
auth.getRedirectResult().then(result=>{
  if(result && result.user) return ensureUserProfile(result.user);
}).catch(()=>{ /* ignore: nothing to complete */ });

function friendlyAuthError(err){
  const map = {
    'auth/email-already-in-use':'That email is already registered — try signing in instead.',
    'auth/invalid-email':'That email address looks invalid.',
    'auth/weak-password':'Password should be at least 6 characters.',
    'auth/wrong-password':'Incorrect email or password.',
    'auth/user-not-found':'Incorrect email or password.',
    'auth/invalid-credential':'Incorrect email or password.',
    'auth/account-exists-with-different-credential':'This email is already used with a different sign-in method (try email/password).'
  };
  return map[err.code] || err.message;
}

function resetPassword(){
  const email = document.getElementById('authEmail').value.trim();
  const errBox = document.getElementById('authError');
  if(!email){ errBox.textContent = 'Enter your email above first, then tap "Forgot password?".'; return; }
  auth.sendPasswordResetEmail(email)
    .then(()=>{ errBox.style.color = 'var(--turquoise)'; errBox.textContent = 'Password reset email sent.'; })
    .catch(err=>{ errBox.style.color = 'var(--danger)'; errBox.textContent = friendlyAuthError(err); });
}

function doLogout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    watchMyProfile(user.uid);
    loadLessons();
  } else {
    me = null;
    document.getElementById('authScreen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
});

function watchMyProfile(uid){
  db.collection('users').doc(uid).onSnapshot(doc=>{
    me = doc.exists ? { ...doc.data(), id: doc.id } : null;
    if(me?.activePair) currentPair = me.activePair;
    renderMain();
  });
}

/* =====================================================================
   4) Lessons (read-only, live)
   ===================================================================== */
function loadLessons(){
  db.collection('lessons').orderBy('order','asc').onSnapshot(snap=>{
    lessons = [];
    snap.forEach(doc=> lessons.push({ ...doc.data(), id: doc.id }));
    renderMain();
  }, err=>{
    document.getElementById('mainArea').innerHTML =
      '<div class="empty-state">Error loading lessons: '+err.message+'</div>';
  });
}

function myCompletedIds(){ return me?.progress?.completedLessonIds || []; }
function myPlan(){ return me?.subscription?.plan || 'free'; }
function myStatus(){ return me?.subscription?.status || 'active'; }
function hasPremiumAccess(){ return myPlan()==='premium' && (myStatus()==='active' || myStatus()==='trial'); }
function levelIsLocked(level){ return level !== 'A0' && !hasPremiumAccess(); }

/* =====================================================================
   5) Onboarding — first-time "choose your course" (Duolingo-style):
   a brand-new account only ever sees ONE active language pair on its
   home screen. Adding or switching to a second language happens on a
   separate screen (the course switcher below), reached from Profile
   or the "Switch" link above the lesson list — never mixed into the
   main lesson list itself.
   ===================================================================== */
function renderOnboarding(){
  document.querySelector('.bottom-nav').classList.add('hidden');
  const wrap = document.getElementById('mainArea');
  if(onboardStep === 1){
    wrap.innerHTML = `
      <div class="section-title"><span class="tick"></span> What's your native language?</div>
      <div style="display:grid;gap:10px;">
        ${Object.keys(LANG_LABEL).map(l=>`
          <div class="card" onclick="pickOnboardExpl('${l}')"><div class="info"><b>${LANG_LABEL[l]}</b></div></div>
        `).join('')}
      </div>
    `;
  } else if(onboardStep === 2){
    const langs = Object.keys(LANG_LABEL).filter(l=>l!==onboardExpl);
    wrap.innerHTML = `
      <div class="section-title"><span class="tick"></span> What do you want to learn?</div>
      <div style="display:grid;gap:10px;margin-bottom:16px;">
        ${langs.map(l=>`
          <div class="card" onclick="pickOnboardLang('${l}')"><div class="info"><b>${LANG_LABEL[l]}</b></div></div>
        `).join('')}
      </div>
      <button class="btn secondary small" onclick="onboardStep=1;renderOnboarding();">&larr; Back</button>
    `;
  } else {
    wrap.innerHTML = `
      <div class="section-title"><span class="tick"></span> Tell us a bit about you</div>
      <div class="field"><label>Age</label><input type="number" id="obAge" min="5" max="99" placeholder="e.g. 22"></div>
      <div class="field"><label>Your current level in ${LANG_LABEL[onboardLang]}</label>
        <select id="obLevel">
          <option value="beginner">Beginner — just starting</option>
          <option value="intermediate">Intermediate — know some basics</option>
          <option value="advanced">Advanced — fairly comfortable</option>
        </select>
      </div>
      <div class="field"><label>Why are you learning ${LANG_LABEL[onboardLang]}?</label>
        <select id="obGoal">
          <option value="travel">Travel</option>
          <option value="work">Work</option>
          <option value="exam">Exam / study</option>
          <option value="family">Family & friends</option>
          <option value="interest">Personal interest</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="field"><label>Referral code (optional)</label><input id="obReferral" placeholder="e.g. AB12CD"></div>
      <button class="btn block" id="obFinishBtn" onclick="finishOnboarding()">Start learning</button>
      <button class="btn secondary small" style="margin-top:8px;" onclick="onboardStep=2;renderOnboarding();">&larr; Back</button>
      <div id="obError" style="color:var(--danger);font-size:13px;margin-top:8px;"></div>
    `;
  }
}
function pickOnboardExpl(l){ onboardExpl = l; onboardStep = 2; renderOnboarding(); }
function pickOnboardLang(l){ onboardLang = l; onboardStep = 3; renderOnboarding(); }

async function finishOnboarding(){
  const btn = document.getElementById('obFinishBtn');
  const errBox = document.getElementById('obError');
  btn.disabled = true;
  errBox.textContent = '';

  const age = parseInt(document.getElementById('obAge').value, 10) || null;
  const selfLevel = document.getElementById('obLevel').value;
  const goal = document.getElementById('obGoal').value;
  const referralInput = document.getElementById('obReferral').value.trim().toUpperCase();
  const pair = {expl: onboardExpl, lang: onboardLang};
  const myCode = generateReferralCode();

  try{
    await db.collection('users').doc(me.id).set({
      activePair: pair,
      courses: firebase.firestore.FieldValue.arrayUnion(pairKey(pair)),
      courseDetails: { [pairKey(pair)]: { level: selfLevel, goal } },
      age, selfLevel, goal,
      referralCode: myCode,
      stats: { xp: 0, streak: 0, lastActiveDate: null }
    }, {merge:true});

    await db.collection('referralCodes').doc(myCode).set({ uid: me.id });
    await db.collection('leaderboard').doc(me.id).set({ name: me.name || '', xp: 0, streak: 0, league: leagueForXp(0) });

    if(referralInput){
      try{
        const refDoc = await db.collection('referralCodes').doc(referralInput).get();
        if(refDoc.exists && refDoc.data().uid !== me.id){
          await db.collection('friendLinks').add({
            a: me.id, b: refDoc.data().uid,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          await db.collection('users').doc(me.id).set({ referredBy: refDoc.data().uid }, {merge:true});
        }
      }catch(e){ /* invalid/unknown referral code — safe to ignore, not fatal */ }
    }

    onboardStep = 1; onboardExpl = null; onboardLang = null;
    document.querySelector('.bottom-nav').classList.remove('hidden');
  } catch(err){
    errBox.textContent = err.message;
    btn.disabled = false;
  }
}

const FREE_COURSE_LIMIT = 2;
let pendingPair = null; // course the user is in the middle of adding

/* Switching to a course you already unlocked — instant, no extra questions */
function switchToCourse(expl, lang){
  if(!me) return;
  const pair = {expl, lang};
  db.collection('users').doc(me.id).set({ activePair: pair }, {merge:true}).then(()=>{
    currentPair = pair;
    currentLevel = 'A0';
    currentView = 'levels';
    renderMain();
  });
}

/* Tapping a locked/new course from the switcher */
function chooseCourseCard(expl, lang){
  const pair = {expl, lang};
  const key = pairKey(pair);
  const alreadyUnlocked = (me.courses||[]).includes(key);

  if(alreadyUnlocked){ switchToCourse(expl, lang); return; }

  const usedCount = (me.courses||[]).length;
  if(!hasPremiumAccess() && usedCount >= FREE_COURSE_LIMIT){
    showToast('Free plan includes ' + FREE_COURSE_LIMIT + ' languages. Upgrade to premium to add more.');
    return;
  }
  pendingPair = pair;
  currentView = 'addCourse';
  renderMain();
}

function renderAddCourseWizard(){
  const wrap = document.getElementById('mainArea');
  wrap.innerHTML = `
    <button class="btn secondary small" onclick="pendingPair=null;currentView='switch';renderMain();">&larr; Cancel</button>
    <div class="section-title" style="margin-top:16px;"><span class="tick"></span> Add ${pairLabel(pendingPair)}</div>
    <div class="field"><label>Your current level</label>
      <select id="addLevel">
        <option value="beginner">Beginner — just starting</option>
        <option value="intermediate">Intermediate — know some basics</option>
        <option value="advanced">Advanced — fairly comfortable</option>
      </select>
    </div>
    <div class="field"><label>Why are you learning this?</label>
      <select id="addGoal">
        <option value="travel">Travel</option>
        <option value="work">Work</option>
        <option value="exam">Exam / study</option>
        <option value="family">Family & friends</option>
        <option value="interest">Personal interest</option>
        <option value="other">Other</option>
      </select>
    </div>
    <button class="btn block" id="addCourseBtn" onclick="confirmAddCourse()">Add language</button>
    <div id="addCourseError" style="color:var(--danger);font-size:13px;margin-top:8px;"></div>
  `;
}

function confirmAddCourse(){
  const btn = document.getElementById('addCourseBtn');
  const errBox = document.getElementById('addCourseError');
  btn.disabled = true;
  const level = document.getElementById('addLevel').value;
  const goal = document.getElementById('addGoal').value;
  const pair = pendingPair;
  const key = pairKey(pair);

  db.collection('users').doc(me.id).set({
    activePair: pair,
    courses: firebase.firestore.FieldValue.arrayUnion(key),
    courseDetails: { [key]: { level, goal } }
  }, {merge:true}).then(()=>{
    currentPair = pair;
    currentLevel = 'A0';
    currentView = 'levels';
    pendingPair = null;
    showToast('Added ' + pairLabel(pair) + '!');
    renderMain();
  }).catch(err=>{
    errBox.textContent = err.message;
    btn.disabled = false;
  });
}

function renderCourseSwitcher(){
  const wrap = document.getElementById('mainArea');
  const isPremium = hasPremiumAccess();
  const usedCount = (me.courses||[]).length;
  wrap.innerHTML = `
    <button class="btn secondary small" onclick="currentView='levels';renderMain();">&larr; Back</button>
    <div class="section-title" style="margin-top:16px;"><span class="tick"></span> Switch or add a language</div>
    <p style="font-size:12.5px;color:#8a8f94;margin-top:-8px;margin-bottom:14px;">
      ${isPremium ? 'Premium: unlimited languages.' : usedCount + '/' + FREE_COURSE_LIMIT + ' free languages unlocked. Upgrade for unlimited.'}
    </p>
    <div id="courseGrid" style="display:grid;gap:10px;"></div>
  `;
  const grid = document.getElementById('courseGrid');
  grid.innerHTML = ALL_PAIRS.map(p=>{
    const key = pairKey(p);
    const isActive = me?.activePair && pairKey(me.activePair) === key;
    const unlocked = (me.courses||[]).includes(key);
    const count = lessons.filter(l=>l.explanationLanguage===p.expl && l.language===p.lang && l.status==='published').length;
    const locked = !unlocked && !isPremium && usedCount >= FREE_COURSE_LIMIT;

    return `
      <div class="card ${isActive?'active-course':''} ${locked?'locked':''}" onclick="chooseCourseCard('${p.expl}','${p.lang}')">
        <div class="info">
          <b>${isActive?'✓ ':''}${pairLabel(p)}</b>
          <span>${locked ? '🔒 Premium required' : unlocked ? count + ' lessons available' : '+ Add this language'}</span>
        </div>
      </div>
    `;
  }).join('');
}

/* =====================================================================
   6) Navigation + rendering
   ===================================================================== */
function setTab(tab){
  currentTab = tab;
  currentView = 'levels';
  renderMain();
}

function renderMain(){
  document.getElementById('navLessonsBtn').classList.toggle('active', currentTab==='lessons');
  document.getElementById('navLeagueBtn').classList.toggle('active', currentTab==='league');
  document.getElementById('navProfileBtn').classList.toggle('active', currentTab==='profile');
  document.querySelector('.bottom-nav').classList.remove('hidden');

  if(!me){
    document.getElementById('mainArea').innerHTML = '<div class="empty-state">Loading...</div>';
    return;
  }
  if(!me.activePair){ renderOnboarding(); return; }

  if(currentTab === 'profile'){ renderProfile(); return; }
  if(currentTab === 'league'){ renderLeague(); return; }

  if(currentView === 'switch') renderCourseSwitcher();
  else if(currentView === 'addCourse') renderAddCourseWizard();
  else if(currentView === 'lesson') renderLessonView();
  else renderLevelsView();
}

function renderLevelsView(){
  currentPair = me.activePair;
  const wrap = document.getElementById('mainArea');
  const levels = ['A0','A1','A2'];
  wrap.innerHTML = `
    <div class="course-pill" onclick="currentView='switch';renderMain();" style="cursor:pointer;">
      ${pairLabel(currentPair)} &nbsp;·&nbsp; Switch
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      ${levels.map(lv=>`
        <button class="btn ${lv===currentLevel?'':'secondary'} small" onclick="setLevel('${lv}')">${lv}${lv==='A0'?' (Free)':' (Premium)'}</button>
      `).join('')}
    </div>
    <div id="lessonListWrap"></div>
  `;
  renderLessonListForPair();
}

function setLevel(lv){ currentLevel = lv; renderLevelsView(); }

function renderLessonListForPair(){
  const wrap = document.getElementById('lessonListWrap');
  if(!wrap) return;

  if(levelIsLocked(currentLevel)){
    wrap.innerHTML = `
      <div class="locked-box">
        🔒 <b>${currentLevel}</b> is a premium level.<br>
        Upgrade your subscription to unlock it.
      </div>
    `;
    return;
  }

  const filtered = lessons.filter(l =>
    l.explanationLanguage===currentPair.expl &&
    l.language===currentPair.lang &&
    l.level===currentLevel &&
    l.status==='published'
  );
  if(filtered.length===0){
    wrap.innerHTML = '<div class="empty-state">No lessons here yet — check back soon.</div>';
    return;
  }
  const done = myCompletedIds();
  wrap.innerHTML = filtered.map(l=>`
    <div class="card" onclick="openLesson('${l.id}')">
      <div class="info">
        <b>${done.includes(l.id) ? '✅ ' : ''}${escapeHtml(l.title||'(Untitled)')}</b>
        <span>${escapeHtml(l.category||'')}</span>
      </div>
    </div>
  `).join('');
}

function openLesson(id){
  openLessonId = id;
  quizAnswers = {};
  currentView = 'lesson';
  renderMain();
}
function closeLesson(){
  openLessonId = null;
  currentView = 'levels';
  renderMain();
}

function toEmbedUrl(url){
  if(!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([\w-]{11})/);
  return m ? `https://www.youtube.com/embed/${m[1]}` : url;
}

function renderLessonView(){
  const l = lessons.find(x=>x.id===openLessonId);
  const wrap = document.getElementById('mainArea');
  if(!l){ wrap.innerHTML = '<div class="empty-state">Lesson not found.</div>'; return; }

  const storyEmbed = toEmbedUrl(l.story?.videoUrl);
  const story2Embed = toEmbedUrl(l.secondStory?.videoUrl);
  const done = myCompletedIds().includes(l.id);

  wrap.innerHTML = `
    <button class="btn secondary small" onclick="closeLesson()">&larr; Back to lessons</button>
    <div class="section-title" style="margin-top:16px;"><span class="tick"></span> ${escapeHtml(l.title)}</div>

    <div class="lesson-block">
      <h3>Story</h3>
      ${storyEmbed ? `<div class="video-wrap"><iframe src="${storyEmbed}" allowfullscreen></iframe></div>` : ''}
      <div class="story-text">${escapeHtml(l.story?.text)}</div>
    </div>

    ${l.analysis ? `
    <div class="lesson-block">
      <h3>Story, sentence by sentence</h3>
      <div class="story-text">${escapeHtml(l.analysis)}</div>
    </div>` : ''}

    ${(l.vocabulary||[]).length ? `
    <div class="lesson-block">
      <h3>Vocabulary</h3>
      ${l.vocabulary.map(v=>`
        <div class="vocab-row">
          <div class="w">${v.article ? escapeHtml(v.article)+' ' : ''}${escapeHtml(v.word)}</div>
          ${v.pronunciation ? `<div class="pron">${escapeHtml(v.pronunciation)}</div>` : ''}
          <div class="meaning">${escapeHtml(v.meaningDari)}</div>
          ${v.example ? `<div class="ex">${escapeHtml(v.example)}</div>` : ''}
        </div>
      `).join('')}
    </div>` : ''}

    ${l.grammarNote?.title || l.grammarNote?.explanation ? `
    <div class="lesson-block">
      <h3>Grammar: ${escapeHtml(l.grammarNote?.title)}</h3>
      <div class="story-text">${escapeHtml(l.grammarNote?.explanation)}</div>
    </div>` : ''}

    ${(l.exercises||[]).length ? `
    <div class="lesson-block">
      <h3>Practice</h3>
      <div id="quizWrap"></div>
    </div>` : ''}

    ${l.secondStory?.text || story2Embed ? `
    <div class="lesson-block">
      <h3>Second story</h3>
      ${story2Embed ? `<div class="video-wrap"><iframe src="${story2Embed}" allowfullscreen></iframe></div>` : ''}
      <div class="story-text">${escapeHtml(l.secondStory?.text)}</div>
    </div>` : ''}

    ${l.roleplayScenario ? `
    <div class="lesson-block">
      <h3>Conversation practice</h3>
      <div class="story-text">${escapeHtml(l.roleplayScenario)}</div>
      <p style="color:#8a8f94;font-size:12.5px;margin-top:8px;">🤖 Talking with the AI here is coming soon.</p>
    </div>` : ''}

    <button class="btn block" ${done?'disabled':''} onclick="markComplete('${l.id}')">
      ${done ? '✅ Completed' : 'Mark lesson as complete'}
    </button>
  `;
  renderQuiz(l);
}

function renderQuiz(l){
  const wrap = document.getElementById('quizWrap');
  if(!wrap) return;
  wrap.innerHTML = (l.exercises||[]).map((ex,i)=>{
    const answered = quizAnswers[i] !== undefined;
    return `
      <div class="quiz-q">
        <p>${escapeHtml(ex.question)}</p>
        ${(ex.options||[]).map((opt,k)=>{
          let cls = '';
          if(answered){
            if(k===ex.correctIndex) cls = 'correct';
            else if(k===quizAnswers[i]) cls = 'wrong';
          }
          return `<button type="button" class="quiz-opt ${cls}" ${answered?'disabled':''} onclick="answerQuiz(${i},${k})">${escapeHtml(opt)}</button>`;
        }).join('')}
      </div>
    `;
  }).join('');
}

function answerQuiz(i, chosen){
  if(quizAnswers[i] !== undefined) return;
  quizAnswers[i] = chosen;
  const l = lessons.find(x=>x.id===openLessonId);
  renderQuiz(l);
}

function markComplete(lessonId){
  if(!me) return;
  const l = lessons.find(x=>x.id===lessonId);
  let correct = 0;
  Object.keys(quizAnswers).forEach(i=>{
    if(l?.exercises?.[i] && quizAnswers[i] === l.exercises[i].correctIndex) correct++;
  });
  const earnedXp = 10 + correct*2;

  const today = new Date().toISOString().slice(0,10);
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  const lastActive = me.stats?.lastActiveDate;
  let streak = me.stats?.streak || 0;
  if(lastActive !== today){
    streak = (lastActive === yesterday) ? streak+1 : 1;
  }
  const newXp = (me.stats?.xp||0) + earnedXp;

  db.collection('users').doc(me.id).update({
    'progress.completedLessonIds': firebase.firestore.FieldValue.arrayUnion(lessonId),
    'stats.xp': newXp,
    'stats.streak': streak,
    'stats.lastActiveDate': today
  }).then(()=>
    db.collection('leaderboard').doc(me.id).set({
      name: me.name || '', xp: newXp, streak, league: leagueForXp(newXp)
    }, {merge:true})
  ).then(()=>{
    showToast('+'+earnedXp+' XP · 🔥 '+streak+'-day streak');
  }).catch(err=> showToast('Error: '+err.message));
}

/* =====================================================================
   7) League tab — daily streak, XP, league standings, and friends
   (friends are linked via referral codes, see finishOnboarding above)
   ===================================================================== */
function renderLeague(){
  const wrap = document.getElementById('mainArea');
  wrap.innerHTML = '<div class="empty-state">Loading league...</div>';

  const myXp = me.stats?.xp || 0;
  const myLeague = leagueForXp(myXp);

  Promise.all([
    db.collection('leaderboard').orderBy('xp','desc').limit(50).get(),
    db.collection('friendLinks').where('a','==',me.id).get(),
    db.collection('friendLinks').where('b','==',me.id).get()
  ]).then(([lbSnap, linksA, linksB])=>{
    const all = [];
    lbSnap.forEach(d=> all.push({ ...d.data(), id:d.id }));

    const friendIds = new Set();
    linksA.forEach(d=> friendIds.add(d.data().b));
    linksB.forEach(d=> friendIds.add(d.data().a));

    const leagueMates = all.filter(u=> (u.league || leagueForXp(u.xp||0)) === myLeague);
    const friends = all.filter(u=> friendIds.has(u.id));

    wrap.innerHTML = `
      <div class="lesson-block">
        <h3>🔥 ${me.stats?.streak||0}-day streak</h3>
        <p style="color:#5b5f63;font-size:14px;margin:0 0 4px;">${myXp} XP · ${myLeague} League</p>
        <p style="font-size:12.5px;color:#8a8f94;">Your referral code: <b>${escapeHtml(me.referralCode||'—')}</b><br>Share it — anyone who enters it becomes your friend here.</p>
      </div>

      <div class="section-title"><span class="tick"></span> ${myLeague} League</div>
      ${leagueMates.length ? leagueMates.map((u,idx)=>`
        <div class="card ${u.id===me.id?'active-course':''}">
          <div class="info"><b>${idx+1}. ${escapeHtml(u.name||'Student')}${u.id===me.id?' (you)':''}</b><span>${u.xp||0} XP</span></div>
        </div>
      `).join('') : '<div class="empty-state">No one in your league yet — complete a lesson to join in!</div>'}

      <div class="section-title"><span class="tick"></span> Friends</div>
      ${friends.length ? friends.map(u=>`
        <div class="card">
          <div class="info"><b>${escapeHtml(u.name||'Student')}</b><span>${u.xp||0} XP · ${u.league||leagueForXp(u.xp||0)} League</span></div>
        </div>
      `).join('') : '<div class="empty-state">No friends yet — share your referral code above.</div>'}
    `;
  }).catch(err=>{
    wrap.innerHTML = '<div class="empty-state">Could not load the league: '+escapeHtml(err.message)+'</div>';
  });
}

/* =====================================================================
   8) Profile tab — shows the current course + a way to switch/add one
   ===================================================================== */
function renderProfile(){
  const wrap = document.getElementById('mainArea');
  if(!me){ wrap.innerHTML = '<div class="empty-state">Loading...</div>'; return; }
  const sub = me.subscription || {plan:'free', status:'active'};
  const done = myCompletedIds().length;
  const totalPublished = lessons.filter(l=>l.status==='published').length;
  const pct = totalPublished ? Math.round(done/totalPublished*100) : 0;

  wrap.innerHTML = `
    <div class="lesson-block">
      <h3>${escapeHtml(me.name||'')}</h3>
      <p style="color:#5b5f63;font-size:14px;margin:0 0 14px;">${escapeHtml(me.email||'')}</p>

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
        <span class="badge ${sub.plan==='premium' && sub.status==='active' ? '' : 'draft'}">
          ${sub.plan==='premium' ? (sub.status==='active' ? 'Premium' : sub.status==='trial' ? 'Trial' : 'Expired') : 'Free'}
        </span>
        <span style="font-size:12.5px;color:#77808a;">${done}/${totalPublished} lessons completed</span>
      </div>
      <div class="progress-track" style="margin-bottom:16px;"><div class="progress-fill" style="width:${pct}%;"></div></div>

      ${sub.plan!=='premium' ? `<p style="font-size:13px;color:#8a8f94;margin-bottom:16px;">Upgrading to premium unlocks the A1 and A2 levels for every language.</p>` : ''}

      <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:#5b5f63;">
        ${me.age ? `<span>🎂 Age ${escapeHtml(String(me.age))}</span>` : ''}
        ${me.selfLevel ? `<span>📊 ${escapeHtml(me.selfLevel)}</span>` : ''}
        ${me.goal ? `<span>🎯 ${escapeHtml(me.goal)}</span>` : ''}
      </div>
    </div>

    <div class="lesson-block">
      <h3>My course</h3>
      <div class="course-pill">${me.activePair ? pairLabel(me.activePair) : '—'}</div>
      <button class="btn secondary block" onclick="currentTab='lessons';currentView='switch';renderMain();">Switch or add a language</button>
    </div>
  `;
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
</script>
